services:
  prism:
    image: ghcr.io/wutongshenqiu/prism:latest
    restart: unless-stopped
    volumes:
      - ./data:/etc/prism
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8317/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - caddy-net

networks:
  caddy-net:
    external: true
