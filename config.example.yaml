# Prism Configuration
# Copy to config.yaml and modify as needed.

# ─── Server ─────────────────────────────────────────────────────────────────
host: "0.0.0.0"
port: 8317

# TLS configuration (optional)
# tls:
#   enable: true
#   cert: "/path/to/cert.pem"
#   key: "/path/to/key.pem"

# ─── Client Authentication ──────────────────────────────────────────────────
# Structured auth keys with per-key settings.
# Leave empty to disable authentication (allow all requests).
auth-keys: []
  # - key: "sk-proxy-your-api-key"
  #   name: "Team Alpha"
  #   tenant-id: "alpha"
  #   allowed-models: ["claude-*", "gpt-4o*"]
  #   allowed-credentials: ["my-claude-*", "shared-*"]  # Restrict to specific credentials by name (glob)
  #   rate-limit:
  #     rpm: 100
  #     tpm: 1000000
  #     cost-per-day-usd: 50.0
  #   budget:
  #     total-usd: 5000.0
  #     period: monthly
  #   expires-at: "2026-12-31T00:00:00Z"
  #   metadata:
  #     team: "engineering"

# ─── Global Proxy ───────────────────────────────────────────────────────────
# Default upstream proxy for all providers. Supports http, https, socks5.
# proxy-url: "socks5://127.0.0.1:1080"
# proxy-url: "http://proxy.company.com:8080"

# ─── Debug & Logging ────────────────────────────────────────────────────────
debug: false
logging-to-file: false
# log-dir: "./logs"

# ─── Dashboard ─────────────────────────────────────────────────────────────
# Web management dashboard (optional).
# Generate password hash: htpasswd -nbBC 12 "" "your-password" | cut -d: -f2
# dashboard:
#   enabled: true
#   username: "admin"
#   password-hash: "$2b$12$..."
#   jwt-secret: "your-jwt-secret-here"     # or set DASHBOARD_JWT_SECRET env var
#   jwt-ttl-secs: 3600
#   request-log-capacity: 10000

# ─── Daemon ────────────────────────────────────────────────────────────────
# daemon:
#   pid-file: "./prism.pid"
#   shutdown-timeout: 30

# ─── Rate Limiting ─────────────────────────────────────────────────────────
# Multi-dimensional rate limiting: RPM + TPM + Cost.
# rate-limit:
#   enabled: true
#   global-rpm: 60            # Global requests per minute (0 = unlimited)
#   per-key-rpm: 30           # Per-API-key requests per minute (0 = unlimited)
#   global-tpm: 0             # Global tokens per minute (0 = unlimited)
#   per-key-tpm: 0            # Per-API-key tokens per minute (0 = unlimited)
#   per-key-cost-per-day-usd: 0.0   # Per-key daily cost limit in USD (0 = unlimited)

# ─── Circuit Breaker ──────────────────────────────────────────────────────
# Three-state circuit breaker for upstream provider credentials.
# circuit-breaker:
#   enabled: true
#   failure-threshold: 5      # Failures before opening
#   cooldown-secs: 30         # Seconds in open state before half-open
#   half-open-max-probes: 1   # Requests allowed in half-open state
#   rolling-window-secs: 60   # Window for counting failures

# ─── Response Cache ───────────────────────────────────────────────────────
# Exact-match response cache (temperature=0, non-streaming only).
# cache:
#   enabled: true
#   max-entries: 10000
#   ttl-secs: 3600

# ─── Audit Logging ───────────────────────────────────────────────────────
# Persistent JSONL audit logs with daily rotation.
# audit:
#   enabled: true
#   dir: "./logs/audit"
#   retention-days: 30
#   detail-level: metadata       # metadata | standard | full
#   max-body-bytes: 16384        # max bytes per body field (request/response)

# ─── Routing Strategy ───────────────────────────────────────────────────────
routing:
  strategy: round-robin   # round-robin | fill-first | latency-aware | geo-aware
  # ewma-alpha: 0.3        # EWMA smoothing factor for latency-aware routing
  # default-region: "us"   # Default region for geo-aware routing
  # Per-model routing strategy overrides (glob patterns supported):
  # model-strategies:
  #   "claude-*": latency-aware
  #   "gpt-4o": fill-first
  # Server-side model fallback chains:
  # model-fallbacks:
  #   gpt-4o: [gpt-4o-mini, gpt-3.5-turbo]
  #   claude-sonnet-4-6: [claude-haiku-4-5-20251001]

# ─── Retry Configuration ────────────────────────────────────────────────────
request-retry: 3
max-retry-interval: 30    # seconds
# retry:
#   max-retries: 3
#   max-backoff-secs: 30
#   jitter-factor: 1.0     # 0.0 = no jitter, 1.0 = full jitter

# ─── Timeout Configuration ─────────────────────────────────────────────────
connect-timeout: 30       # seconds, TCP connect timeout
request-timeout: 300      # seconds, total request timeout (5min for streaming)

# ─── Streaming ──────────────────────────────────────────────────────────────
streaming:
  keepalive-seconds: 15

# ─── Cost Tracking ─────────────────────────────────────────────────────────
# Custom model price overrides (USD per 1M tokens).
# Built-in prices include cache token pricing for Claude/OpenAI/Gemini.
# model-prices:
#   my-custom-model:
#     input: 1.0             # USD per 1M input tokens
#     output: 2.0            # USD per 1M output tokens
#     cache-read: 0.5        # USD per 1M cache-read tokens (optional, defaults to input)
#     cache-write: 1.25      # USD per 1M cache-creation tokens (optional, defaults to input)
#   gpt-4o:
#     input: 2.50            # Override built-in price
#     output: 10.0

# ─── Provider Credentials ───────────────────────────────────────────────────
# Each provider supports multiple API keys with optional per-key settings.
#
# Per-key options:
#   api-key:          (required) API key string. Supports env://VAR and file:///path.
#   base-url:         Custom API endpoint URL
#   proxy-url:        Per-key proxy (overrides global proxy-url)
#                     Set to "" for direct connection (bypass global proxy)
#   prefix:           Model name prefix (e.g., "teamA/")
#   models:           List of available models [{id, alias}]
#   excluded-models:  Models to exclude (supports * wildcard)
#   headers:          Custom HTTP headers sent to the upstream provider.
#                     Use this to override User-Agent or add provider-specific
#                     headers (similar to LiteLLM's extra_headers).
#   weight:           Routing weight for weighted round-robin (default: 1)
#   region:           Region tag for geo-aware routing (e.g., "us", "eu", "asia")

claude-api-key:
  - api-key: "sk-ant-your-claude-key"
    # api-key: "env://CLAUDE_API_KEY"       # Load from environment variable
    # api-key: "file:///etc/secrets/claude"  # Load from file
    # base-url: "https://api.anthropic.com"
    # proxy-url: "http://proxy:8080"
    # region: "us"
    # headers:
    #   user-agent: "claude-code/2.1.62"    # Override default User-Agent
    #   anthropic-beta: "max-tokens-3-5-sonnet-2024-07-15"
    # models:
