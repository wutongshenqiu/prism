services:
  gateway:
    build: .
    volumes:
      - ./tests/e2e-docker/config.e2e.yaml:/etc/ai-proxy/config.yaml:ro
    environment:
      - E2E_BAILIAN_API_KEY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8317/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 10

  test-runner:
    image: node:20-bookworm-slim
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - ./tests/e2e-docker:/tests:ro
      - e2e-report:/output
    environment:
      - GATEWAY_URL=http://gateway:8317
      - TEST_FILTER
    entrypoint: ["bash", "/tests/entrypoint.sh"]

volumes:
  e2e-report:
