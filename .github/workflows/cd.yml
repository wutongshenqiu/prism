name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push Image
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to SSH Host
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            cd /opt/prism

            # Pull latest image
            docker pull ghcr.io/wutongshenqiu/prism:latest

            # Extract frontend dist from image
            CONTAINER_ID=$(docker create ghcr.io/wutongshenqiu/prism:latest)
            rm -rf /opt/prism/web-dist/*
            docker cp "$CONTAINER_ID":/usr/share/prism/web/. /opt/prism/web-dist/
            docker rm "$CONTAINER_ID"

            # Restart Prism on the SSH host. The live runtime config is mounted from
            # /opt/prism/data/config.yaml via docker compose.
            docker compose down
            docker compose up -d

            # Wait for Docker health check to pass
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' prism-prism-1 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "Health check passed!"
                exit 0
              fi
              echo "  status: $STATUS ($i/30)"
              sleep 2
            done
            echo "Health check failed after 60s"
            docker compose logs --tail=50
            exit 1
