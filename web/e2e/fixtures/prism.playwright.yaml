host: "127.0.0.1"
port: 18317

auth-keys:
  - key: "sk-proxy-playwright"
    name: "Playwright E2E"
    tenant-id: "playwright"

routing:
  default-profile: balanced

streaming:
  keepalive-seconds: 15

dashboard:
  enabled: true
  username: "playwright"
  password-hash: "$2y$12$NCWryXOXqT2cCN7ZJjTo2uBe5H0zxNaBDMo96daC6HTdMeGbs9Q5i"
  jwt-secret: "playwright-jwt-secret"
  jwt-ttl-secs: 3600
  request-log-capacity: 256
  localhost-only: true

providers:
  - name: codex-gateway
    format: openai
    upstream: codex
    base-url: "https://chatgpt.com/backend-api/codex"
    wire-api: responses
    models:
      - id: "gpt-5"
      - id: "gpt-5-mini"
    upstream-presentation:
      profile: codex-cli
      mode: always
      strict-mode: false
      sensitive-words: []
      cache-user-id: false
      custom-headers:
        user-agent: "Codex/1.0.0"
    auth-profiles:
      - id: codex-user
        mode: codex-oauth
        access-token: "codex-access-token"
        refresh-token: "codex-refresh-token"
        expires-at: "2030-01-01T00:00:00Z"
        account-id: "acct_playwright"
        email: "playwright@example.com"
        last-refresh: "2030-01-01T00:00:00Z"

  - name: claude-gateway
    format: claude
    base-url: "https://api.anthropic.com"
    api-key: "sk-ant-playwright"
    models:
      - id: "claude-sonnet-4-20250514"
        alias: "sonnet"
